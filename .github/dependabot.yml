version: 2

registries:
  docker-hardened:
    type: "docker-registry"
    url: "dhi.io"
    replaces-base: true
    username: ${{ secrets.DOCKERHUB_USERNAME }}
    password: ${{ secrets.DOCKERHUB_TOKEN }}

updates:
- package-ecosystem: "docker"
  directory: "/"
  registries:
      - "docker-hardened"
    commit-message:
      prefix: "docker"
    labels: [ 'docker' ]
    assignees:
    - "Harvester57"
    schedule:
      interval: "cron"
      cronjob: "0 7 * * *"
      timezone: "Europe/Paris"
    groups:
      docker-dependencies:
        applies-to: version-updates
        patterns:
          - "*"
  - package-ecosystem: "github-actions"
    directory: "/"
    commit-message:
      prefix: "actions"
    labels: [ 'github-actions' ]
    assignees:
    - "Harvester57"
    schedule:
      interval: "cron"
      cronjob: "0 7 * * *"
      timezone: "Europe/Paris"
    groups:
      actions-dependencies:
        applies-to: version-updates
        patterns:
          - "*"
